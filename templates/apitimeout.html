<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイムアウト - カピバラチューブ 🦛</title>
  <link rel="stylesheet" href="/statics/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .error-page {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .error-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 28px; padding: 48px 40px;
      text-align: center; max-width: 500px; width: 100%;
      box-shadow: 0 16px 48px var(--shadow);
    }
    .timeout-kapi {
      font-size: 5rem; display: block; margin-bottom: 20px;
      animation: sleep 2s ease-in-out infinite;
    }
    @keyframes sleep {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(0.93) translateY(4px); }
    }
    .error-title {
      font-size: 1.5rem; font-weight: 700; margin-bottom: 12px;
      color: var(--kapi-accent);
    }
    .error-desc {
      font-size: 0.9rem; color: var(--text-sub); line-height: 1.7;
      margin-bottom: 28px;
    }
    .error-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .countdown {
      display: inline-block; margin-top: 20px;
      background: var(--bg-2); border-radius: 12px; padding: 10px 20px;
      font-size: 0.85rem; color: var(--text-sub);
    }
    .countdown strong { color: var(--kapi-water); font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-box">
      <span class="timeout-kapi">💤🦛</span>
      <h1 class="error-title">タイムアウト</h1>
      <p class="error-desc">
        カピバラが居眠りしているみたいです 😴<br>
        Invidious インスタンスの応答が遅すぎました。<br>
        <!-- 引用元: sennin-tube-plus main.py fetch_invidious() timeout=6.0秒 -->
        <small>(タイムアウト: 6秒 / 投機的実行でも全インスタンス未応答)</small>
      </p>
      <div class="error-actions">
        <a href="javascript:history.back()" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> 戻る
        </a>
        <a href="javascript:location.reload()" class="btn btn-primary">
          <i class="fas fa-redo"></i> 再試行
        </a>
        <a href="/status" class="btn btn-secondary">
          <i class="fas fa-signal"></i> 稼働状況を確認
        </a>
      </div>
      <div class="countdown">
        <strong id="sec">10</strong> 秒後に自動でリロード
      </div>
    </div>
  </div>

  <script>
    let n = 10;
    const el = document.getElementById('sec');
    const t = setInterval(() => {
      n--;
      el.textContent = n;
      if (n <= 0) { clearInterval(t); location.reload(); }
    }, 1000);
  </script>
</body>
</html>
