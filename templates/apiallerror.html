<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エラー - カピバラチューブ 🦛</title>
  <link rel="stylesheet" href="/statics/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .error-page {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .error-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 28px; padding: 48px 40px;
      text-align: center; max-width: 500px; width: 100%;
      box-shadow: 0 16px 48px var(--shadow);
    }
    .error-kapi { font-size: 5rem; display: block; margin-bottom: 20px;
      animation: wobble 3s ease-in-out infinite;
    }
    @keyframes wobble {
      0%, 100% { transform: rotate(-5deg); }
      50%       { transform: rotate(5deg); }
    }
    .error-title {
      font-size: 1.5rem; font-weight: 700; margin-bottom: 12px;
      color: var(--kapi-red);
    }
    .error-desc {
      font-size: 0.9rem; color: var(--text-sub); line-height: 1.7;
      margin-bottom: 28px;
    }
    .error-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .error-detail {
      margin-top: 24px; padding: 12px 16px;
      background: var(--bg-2); border-radius: 12px;
      font-family: monospace; font-size: 0.78rem; color: var(--text-sub);
      text-align: left; word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-box">
      <span class="error-kapi">🦛</span>
      <h1 class="error-title">APIエラー</h1>
      <p class="error-desc">
        すべての Invidious インスタンスへのアクセスに失敗しました。<br>
        しばらく経ってからもう一度お試しください。<br>
        <small style="color:var(--text-sub)">
          <!-- 引用元: sennin-tube-plus main.py fetch_invidious() - 全インスタンス失敗時にこのページへリダイレクト -->
          (全 {{ instance_count }} インスタンスに接続できませんでした)
        </small>
      </p>
      <div class="error-actions">
        <a href="javascript:history.back()" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> 戻る
        </a>
        <a href="javascript:location.reload()" class="btn btn-primary">
          <i class="fas fa-redo"></i> 再試行
        </a>
        <a href="/status" class="btn btn-secondary">
          <i class="fas fa-signal"></i> 稼働状況
        </a>
      </div>
    </div>
  </div>
</body>
</html>
